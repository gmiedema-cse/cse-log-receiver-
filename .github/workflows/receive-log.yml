name: Receive Diagnostic Log

on:
  workflow_dispatch:
    inputs:
      filename:
        required: true
      csv:
        required: true
      customer:
        required: true
      cap:
        required: true
      timestamp:
        required: true

jobs:
  save-log:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write CSV log
        run: |
          mkdir -p logs
          printf '%s' "${{ github.event.inputs.csv }}" > "${{ github.event.inputs.filename }}"

      - name: Commit and push
        run: |
          git config user.name "CSE Diagnostics Bot"
          git config user.email "diagnostics@cse-pd.com"
          git add logs/
          git commit -m "Diagnostic log: ${{ github.event.inputs.customer }} / ${{ github.event.inputs.cap }} (${{ github.event.inputs.timestamp }})"
          git push
